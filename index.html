        function montar() {
            const c = document.getElementById('container'); 
            c.innerHTML = "";
            document.getElementById('instrucao').innerText = banco[fase].t;

            // Criar versão bagunçada (embaralha até que não seja igual à certa)
            let bagunca;
            do {
                bagunca = [...banco[fase].certa].sort(() => Math.random() - 0.5);
            } while (JSON.stringify(bagunca) === JSON.stringify(banco[fase].certa));

            bagunca.forEach(url => {
                const div = document.createElement('div');
                div.className = 'item';
                const img = document.createElement('img');
                img.src = url;
                div.appendChild(img);
                
                div.onclick = () => {
                    if(!sel) { 
                        sel = div; 
                        div.classList.add('selected'); 
                    } else {
                        let temp = div.querySelector('img').src;
                        div.querySelector('img').src = sel.querySelector('img').src;
                        sel.querySelector('img').src = temp;
                        sel.classList.remove('selected'); 
                        sel = null;
                    }
                };
                c.appendChild(div);
            });
        }

        function checar() {
            const atuais = Array.from(document.querySelectorAll('.item img')).map(img => img.src);
            const corretas = banco[fase].certa;

            if(JSON.stringify(atuais) === JSON.stringify(corretas)) {
                nota += 2.5; 
                document.getElementById('nota').innerText = nota;
                
                if(fase < 4) { 
                    alerta("MUITO BEM! 🌟", "#4caf50"); 
                    fase++; 
                    setTimeout(montar, 2000); 
                } else { 
                    alerta("NOTA 10! VOCÊ É FERA! 🏆", "#ff9800"); 
                }
            } else { 
                alerta("ESTÁ FORA DE ORDEM! TENTE DE NOVO ❌", "#f44336"); 
            }
        }

        function alerta(t, c) {
            const p = document.getElementById('pop'); 
            p.innerText = t; p.style.backgroundColor = c;
            p.style.display = 'block'; 
            setTimeout(() => p.style.display = 'none', 2000);
        }

        montar();
    </script>

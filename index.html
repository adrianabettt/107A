<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Algoritmos Visuais - 3 Passos</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; text-align: center; background-color: #eef2f3; padding: 10px; }
        .caixa { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 40px; border: 8px solid #2196f3; box-shadow: 0 10px 0 #1976d2; }
        .placar { font-size: 32px; font-weight: bold; color: #1976d2; margin-bottom: 20px; background: #bbdefb; border-radius: 20px; padding: 10px; }
        .grid { display: flex; justify-content: center; gap: 15px; margin: 25px 0; min-height: 140px; }
        .item { width: 140px; height: 140px; background: #f8f9fa; border-radius: 25px; cursor: pointer; border: 5px solid #cfd8dc; overflow: hidden; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .item img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
        .item.selected { border-color: #ff9800; transform: rotate(-3deg) scale(1.1); box-shadow: 0 0 20px rgba(255,152,0,0.4); }
        .btn { padding: 18px 60px; background: #4caf50; color: white; border: none; border-radius: 50px; font-size: 26px; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #2e7d32; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        #pop { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 50px; border-radius: 40px; color: white; font-size: 40px; font-weight: bold; z-index: 100; text-align: center; width: 80%; border: 10px solid white; box-shadow: 0 0 100px rgba(0,0,0,0.5); }

        /* Tela de nota final */
        #telaFinal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        #telaFinal.visivel { display: flex; }
        .cartaoFinal {
            background: white;
            border-radius: 40px;
            padding: 50px 40px;
            border: 10px solid #ff9800;
            box-shadow: 0 0 60px rgba(255,152,0,0.7);
            max-width: 460px;
            width: 90%;
            text-align: center;
            animation: aparecer 0.5s ease;
        }
        @keyframes aparecer {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .troféu    { font-size: 90px; margin-bottom: 8px; }
        .estrelas  { font-size: 48px; letter-spacing: 4px; margin-bottom: 8px; }
        .tituloFinal { font-size: 34px; font-weight: bold; color: #ff9800; margin-bottom: 6px; }
        .notaFinal   { font-size: 90px; font-weight: bold; color: #4caf50; line-height: 1; margin: 8px 0; }
        .legendaNota { font-size: 20px; color: #777; margin-bottom: 16px; }
        .mensagemFinal { font-size: 24px; color: #1976d2; font-weight: bold; margin-bottom: 28px; }
        .btnReiniciar {
            padding: 16px 50px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #1565c0;
        }
        .btnReiniciar:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <div class="caixa">
        <div class="placar">NOTA: <span id="nota">0</span></div>
        <h2 id="instrucao">CARREGANDO...</h2>
        <div class="grid" id="container"></div>
        <button class="btn" onclick="checar()">OK! ✅</button>
    </div>

    <div id="pop"></div>

    <!-- ===== TELA DE NOTA FINAL ===== -->
    <div id="telaFinal">
        <div class="cartaoFinal">
            <div class="troféu">🏆</div>
            <div class="estrelas">⭐⭐⭐⭐⭐</div>
            <div class="tituloFinal">PARABÉNS!</div>
            <div class="notaFinal" id="notaFinalValor">10</div>
            <div class="legendaNota">sua nota</div>
            <div class="mensagemFinal" id="mensagemFinal">VOCÊ É FERA! 🎉</div>
            <button class="btnReiniciar" onclick="reiniciar()">JOGAR DE NOVO 🔄</button>
        </div>
    </div>

    <script>
        let fase = 1;
        let nota = 0;
        let sel  = null;

        const banco = {
            1: {
                t: "COMO FAZER UM OMELETE?",
                certa: [
                    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRd1wgCGhQwkysoz7N5th1d0zAyBH2Slp5RVw&s",
                    "https://img.freepik.com/vetores-premium/bater-icone-de-ovo-processo-de-cozimento-ou-cozimento-dos-desenhos-animados_81894-8718.jpg",
                    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYRzlSGkfK7VgZ-QSD3pt4-ZnbWu1DqAcSNQ&s"
                ]
            },
            2: {
                t: "SUCO DE LARANJA?",
                certa: [
                    "https://preview.free3d.com/img/2017/09/1871866224208512967/6q6wj9y1.jpg",
                     "https://thumbs.dreamstime.com/b/espremendo-laranja-12314843.jpg",
					 "https://www.shutterstock.com/image-photo/orange-juice-clear-glass-bottle-600nw-2758681661.jpg"
                   
                ]
            },
            3: {
                t: "ROUPA NO VARAL!",
                certa: [
                    "https://img.freepik.com/vetores-gratis/degraus-de-lavanderia-de-roupas-sujas_74855-15396.jpg?semt=ais_hybrid&w=740&q=80",
                     "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYazci5C93RQOWpTE17lXOSE3n5Ql7VdUgxw&s",
					 "https://media.istockphoto.com/id/1776948262/pt/vetorial/clothes-hang-on-laundry-rope-clothesline-and-dry-concept-vector-flat-graphic-design.jpg?s=612x612&w=0&k=20&c=2mR35f6mOTqM7i_1OOQY_CKQBT68sTQyg4whoAtb8I8=",
                ]
            },
            4: {
                t: "BAILARINA!",
                certa: [
                    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREV2zjab1B2Ck8F8_Th5RY6eDVjgq9KDsqHA&s",
                    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzQfgW0HNB0My5_OhDhkx92KO2N5sSLWa51Q&s",
                    "https://www.shutterstock.com/image-vector/christmas-ballerina-dances-holiday-outfit-600nw-2646830313.jpg"
                ]
            }
        };

        /* ---------- monta a fase ---------- */
        function montar() {
            const c = document.getElementById('container');
            c.innerHTML = "";
            document.getElementById('instrucao').innerText = banco[fase].t;

            let bagunca;
            do {
                bagunca = [...banco[fase].certa].sort(() => Math.random() - 0.5);
            } while (JSON.stringify(bagunca) === JSON.stringify(banco[fase].certa));

            bagunca.forEach(url => {
                const div = document.createElement('div');
                div.className = 'item';
                const img = document.createElement('img');
                img.src = url;
                div.appendChild(img);

                div.onclick = () => {
                    if (!sel) {
                        sel = div;
                        div.classList.add('selected');
                    } else {
                        let temp = div.querySelector('img').src;
                        div.querySelector('img').src = sel.querySelector('img').src;
                        sel.querySelector('img').src = temp;
                        sel.classList.remove('selected');
                        sel = null;
                    }
                };
                c.appendChild(div);
            });
        }

        /* ---------- verifica a resposta ---------- */
        function checar() {
            const atuais   = Array.from(document.querySelectorAll('.item img')).map(img => img.src);
            const corretas = banco[fase].certa;

            if (JSON.stringify(atuais) === JSON.stringify(corretas)) {
                nota += 2.5;
                document.getElementById('nota').innerText = nota;

                if (fase < 4) {
                    alerta("MUITO BEM! 🌟", "#4caf50");
                    fase++;
                    setTimeout(montar, 2000);
                } else {
                    /* ===== ÚLTIMA FASE CONCLUÍDA → mostra tela final ===== */
                    setTimeout(mostrarTelaFinal, 800);
                }
            } else {
                alerta("ESTÁ FORA DE ORDEM! TENTE DE NOVO ❌", "#f44336");
            }
        }

        /* ---------- exibe tela de encerramento ---------- */
        function mostrarTelaFinal() {
            document.getElementById('notaFinalValor').innerText = nota;

            let msg;
            if      (nota === 10)  msg = "VOCÊ É FERA! 🎉";
            else if (nota >= 7.5)  msg = "MUITO BOM! 👏";
            else if (nota >= 5)    msg = "BOM TRABALHO! 😊";
            else                   msg = "CONTINUE TENTANDO! 💪";

            document.getElementById('mensagemFinal').innerText = msg;
            document.getElementById('telaFinal').classList.add('visivel');
        }

        /* ---------- reinicia o jogo ---------- */
        function reiniciar() {
            fase = 1;
            nota = 0;
            sel  = null;
            document.getElementById('nota').innerText = 0;
            document.getElementById('telaFinal').classList.remove('visivel');
            montar();
        }

        /* ---------- popup rápido ---------- */
        function alerta(t, c) {
            const p = document.getElementById('pop');
            p.innerText = t;
            p.style.backgroundColor = c;
            p.style.display = 'block';
            setTimeout(() => p.style.display = 'none', 2000);
        }

        montar();
    </script>
</body>
</html>
